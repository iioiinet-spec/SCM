<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사고력 수학 | 세영코딩연구소</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700;900&family=Noto+Sans+KR:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0e1a;
  --bg2: #0f1525;
  --bg3: #141c30;
  --card: #111827;
  --card2: #1a2236;
  --gold: #d4a843;
  --gold2: #f0c060;
  --gold-dim: rgba(212,168,67,0.15);
  --teal: #38c9b4;
  --teal-dim: rgba(56,201,180,0.12);
  --rose: #e05b7a;
  --rose-dim: rgba(224,91,122,0.12);
  --violet: #9b7fe8;
  --violet-dim: rgba(155,127,232,0.12);
  --sky: #5ba3d9;
  --sky-dim: rgba(91,163,217,0.12);
  --lime: #7ec86e;
  --lime-dim: rgba(126,200,110,0.12);
  --orange: #e07840;
  --orange-dim: rgba(224,120,64,0.12);
  --text: #e8e4d8;
  --text2: #9fa8b8;
  --text3: #6b7484;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(212,168,67,0.25);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Noto Sans KR',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}

/* ── STAR BACKGROUND ── */
#stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--dur,3s) ease-in-out infinite var(--delay,0s)}
@keyframes twinkle{0%,100%{opacity:var(--min,0.1)}50%{opacity:var(--max,0.8)}}

/* ── LAYOUT ── */
.wrap{position:relative;z-index:1;max-width:1280px;margin:0 auto;padding:0 24px}

/* ── HERO ── */
header{
  position:relative;
  padding:72px 24px 56px;
  text-align:center;
  overflow:hidden;
}
.hero-badge{
  display:inline-block;
  font-size:11px;letter-spacing:3px;text-transform:uppercase;
  color:var(--gold);border:1px solid var(--border2);
  padding:6px 18px;border-radius:20px;margin-bottom:28px;
  background:var(--gold-dim);
}
header h1{
  font-family:'Noto Serif KR',serif;
  font-size:clamp(36px,6vw,72px);
  font-weight:900;line-height:1.1;
  background:linear-gradient(135deg,var(--gold2) 0%,var(--gold) 40%,#c88830 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  margin-bottom:16px;
}
.hero-sub{font-size:14px;color:var(--text2);letter-spacing:1px;margin-bottom:36px}
.target-tags{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-bottom:48px}
.tag{
  padding:6px 16px;border-radius:20px;font-size:12px;font-weight:500;
  border:1px solid;cursor:default;
}
.tag-gold{color:var(--gold);border-color:rgba(212,168,67,0.4);background:var(--gold-dim)}
.tag-teal{color:var(--teal);border-color:rgba(56,201,180,0.4);background:var(--teal-dim)}
.tag-violet{color:var(--violet);border-color:rgba(155,127,232,0.4);background:var(--violet-dim)}

/* ── STATS BAR ── */
.stats-bar{
  display:grid;grid-template-columns:repeat(4,1fr);gap:1px;
  background:var(--border);border:1px solid var(--border);
  border-radius:16px;overflow:hidden;margin-bottom:56px;
}
.stat-item{
  background:var(--card);padding:24px 16px;text-align:center;
  transition:background .2s;
}
.stat-item:hover{background:var(--card2)}
.stat-num{
  font-family:'Playfair Display',serif;font-size:36px;
  color:var(--gold);display:block;line-height:1;margin-bottom:6px;
}
.stat-label{font-size:11px;color:var(--text3);letter-spacing:1px}

/* ── FILTER TABS ── */
.section-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:28px;flex-wrap:wrap;gap:16px;
}
.section-title{
  font-family:'Noto Serif KR',serif;
  font-size:22px;color:var(--text);
}
.filter-group{display:flex;gap:8px;flex-wrap:wrap}
.filter-btn{
  padding:8px 20px;border-radius:24px;border:1px solid var(--border);
  background:transparent;color:var(--text2);font-size:12px;
  font-family:'Noto Sans KR',sans-serif;cursor:pointer;
  transition:all .2s;
}
.filter-btn:hover,.filter-btn.active{
  border-color:var(--gold);color:var(--gold);background:var(--gold-dim);
}

/* ── CHAPTER GRID ── */
.chapter-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
  gap:20px;margin-bottom:80px;
}
.chapter-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:20px;overflow:hidden;cursor:pointer;
  transition:transform .25s, border-color .25s, box-shadow .25s;
  position:relative;
}
.chapter-card:hover{
  transform:translateY(-4px);
  border-color:var(--card-accent,rgba(212,168,67,0.35));
  box-shadow:0 16px 48px rgba(0,0,0,0.5);
}
.chapter-card.hidden{display:none}
.card-stripe{height:4px;width:100%;background:var(--card-color,var(--gold))}
.card-body{padding:24px}
.card-head{display:flex;align-items:flex-start;gap:14px;margin-bottom:16px}
.card-icon{
  width:48px;height:48px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;flex-shrink:0;
  background:var(--card-dim,var(--gold-dim));
}
.card-meta{flex:1}
.card-chapter{font-size:10px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.card-title{font-family:'Noto Serif KR',serif;font-size:17px;font-weight:700;color:var(--text);line-height:1.3}
.grade-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.grade-pill{
  font-size:10px;padding:3px 10px;border-radius:10px;
  border:1px solid;font-weight:500;
}
.grade-el{color:#7ec86e;border-color:rgba(126,200,110,0.4);background:rgba(126,200,110,0.08)}
.grade-mid{color:#5ba3d9;border-color:rgba(91,163,217,0.4);background:rgba(91,163,217,0.08)}
.grade-adv{color:#e07840;border-color:rgba(224,120,64,0.4);background:rgba(224,120,64,0.08)}
.card-desc{font-size:12px;color:var(--text2);line-height:1.7;margin-bottom:16px}
.topics-preview{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.topic-chip{
  font-size:10px;padding:4px 10px;border-radius:8px;
  background:rgba(255,255,255,0.05);color:var(--text3);
  border:1px solid var(--border);
}
.card-footer{
  display:flex;align-items:center;justify-content:space-between;
  border-top:1px solid var(--border);padding-top:14px;
}
.difficulty-bar{display:flex;gap:3px}
.diff-dot{width:8px;height:8px;border-radius:50%;background:var(--border)}
.diff-dot.on{background:var(--card-color,var(--gold))}
.card-arrow{
  font-size:18px;color:var(--text3);
  transition:transform .2s, color .2s;
}
.chapter-card:hover .card-arrow{transform:translateX(4px);color:var(--card-color,var(--gold))}

/* ── MODAL ── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.85);
  z-index:1000;display:flex;align-items:center;justify-content:center;
  padding:20px;opacity:0;pointer-events:none;
  transition:opacity .25s;
  backdrop-filter:blur(8px);
}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{
  background:var(--bg2);border:1px solid var(--border2);
  border-radius:24px;max-width:760px;width:100%;
  max-height:90vh;overflow-y:auto;
  transform:scale(0.95) translateY(20px);
  transition:transform .3s cubic-bezier(.34,1.56,.64,1);
}
.modal-overlay.open .modal{transform:scale(1) translateY(0)}
.modal-header{
  position:sticky;top:0;background:var(--bg2);
  border-bottom:1px solid var(--border);
  padding:24px 28px;display:flex;align-items:center;gap:16px;
  z-index:10;
}
.modal-icon{
  width:56px;height:56px;border-radius:16px;
  display:flex;align-items:center;justify-content:center;font-size:26px;
}
.modal-title-wrap{flex:1}
.modal-chapter-label{font-size:10px;color:var(--text3);letter-spacing:2px;text-transform:uppercase}
.modal-title{font-family:'Noto Serif KR',serif;font-size:22px;font-weight:700}
.modal-close{
  width:36px;height:36px;border-radius:10px;border:1px solid var(--border);
  background:transparent;color:var(--text2);font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;flex-shrink:0;
}
.modal-close:hover{background:var(--border);color:var(--text)}
.modal-body{padding:28px}
.modal-section{margin-bottom:28px}
.modal-section-title{
  font-size:12px;letter-spacing:2px;text-transform:uppercase;
  color:var(--text3);margin-bottom:14px;
  display:flex;align-items:center;gap:8px;
}
.modal-section-title::before{content:'';display:block;width:20px;height:1px;background:var(--text3)}

.topic-list{display:flex;flex-direction:column;gap:8px}
.topic-item{
  background:var(--card);border:1px solid var(--border);
  border-radius:12px;padding:14px 16px;
  display:flex;align-items:flex-start;gap:12px;
  transition:border-color .15s;cursor:pointer;
}
.topic-item:hover{border-color:var(--modal-accent,var(--gold))}
.topic-item.expanded .topic-detail{display:block}
.topic-num{
  min-width:26px;height:26px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:var(--bg);
  background:var(--modal-accent,var(--gold));flex-shrink:0;
}
.topic-content{flex:1}
.topic-name{font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px}
.topic-eng{font-size:11px;color:var(--text3);margin-bottom:6px}
.topic-detail{display:none;font-size:12px;color:var(--text2);line-height:1.8;margin-top:8px}
.topic-detail ul{padding-left:16px}
.topic-detail li{margin-bottom:4px}
.topic-keywords{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.kw{
  font-size:10px;padding:3px 8px;border-radius:6px;
  background:rgba(255,255,255,0.04);color:var(--text3);border:1px solid var(--border);
}

.problem-box{
  background:var(--card);border:1px solid var(--border);
  border-left:3px solid var(--modal-accent,var(--gold));
  border-radius:0 12px 12px 0;padding:16px 18px;
  margin-bottom:10px;
}
.problem-label{font-size:10px;color:var(--modal-accent,var(--gold));letter-spacing:1px;margin-bottom:8px;font-weight:600}
.problem-text{font-size:13px;color:var(--text2);line-height:1.8}

.resource-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.resource-item{
  background:var(--card);border:1px solid var(--border);
  border-radius:12px;padding:14px;
}
.res-label{font-size:10px;color:var(--text3);margin-bottom:6px;letter-spacing:1px}
.res-value{font-size:12px;color:var(--text)}

/* ── ROADMAP ── */
.roadmap-section{margin-bottom:80px}
.roadmap-track{
  position:relative;
  display:flex;flex-direction:column;gap:0;
}
.roadmap-level{
  display:grid;grid-template-columns:120px 1fr;gap:24px;
  padding:20px 0;align-items:start;
}
.roadmap-level+.roadmap-level{border-top:1px solid var(--border)}
.level-label{
  font-size:11px;font-weight:700;letter-spacing:1px;
  color:var(--text2);padding-top:4px;
}
.roadmap-chips{display:flex;flex-wrap:wrap;gap:8px}
.roadmap-chip{
  padding:6px 14px;border-radius:10px;font-size:11px;
  border:1px solid var(--border);color:var(--text2);
  background:var(--card);cursor:pointer;transition:all .15s;
}
.roadmap-chip:hover,.roadmap-chip.hl{
  border-color:var(--gold);color:var(--gold);background:var(--gold-dim);
}

/* ── FOOTER ── */
footer{
  border-top:1px solid var(--border);padding:32px 24px;text-align:center;
}
.footer-brand{
  font-family:'Noto Serif KR',serif;font-size:16px;
  color:var(--gold);margin-bottom:8px;
}
.footer-copy{font-size:11px;color:var(--text3)}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}

/* ── RESPONSIVE ── */
@media(max-width:640px){
  .stats-bar{grid-template-columns:1fr 1fr}
  .resource-grid{grid-template-columns:1fr}
  .roadmap-level{grid-template-columns:1fr;gap:10px}
  .level-label{padding-top:0}
}
</style>
</head>
<body>

<div id="stars"></div>

<header>
  <div class="wrap">
    <div class="hero-badge">세영코딩연구소 · Ph.D Kim</div>

</header>

<main class="wrap">

  <!-- FILTER -->
  <div class="section-header">
    <h2 class="section-title">📚 전체 커리큘럼</h2>
    <div class="filter-group" id="filterGroup">
      <button class="filter-btn active" data-filter="all">전체</button>
      <button class="filter-btn" data-filter="elementary">초등</button>
      <button class="filter-btn" data-filter="middle">중등</button>
      <button class="filter-btn" data-filter="advanced">심화</button>
    </div>
  </div>

  <!-- CHAPTER GRID -->
  <div class="chapter-grid" id="chapterGrid"></div>

  <!-- ROADMAP -->
  <div class="roadmap-section">
    <div class="section-header">
      <h2 class="section-title">🗺️ 학습 로드맵</h2>
    </div>
    <div class="roadmap-track" id="roadmapTrack"></div>
  </div>

</main>

<footer>
  <div class="footer-brand">세영코딩연구소 — 사고력 수학</div>
  <p class="footer-copy">© Ph.D Kim · 영재고·과학고·디미고 대비 전문 교육기관</p>
</footer>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <div class="modal-header" id="modalHeader"></div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

/* ─────────────── RENDER CARDS ─────────────── */
function renderCards(filter){
  const grid = document.getElementById('chapterGrid');
  grid.innerHTML = '';
  CHAPTERS.forEach(ch => {
    const show = filter === 'all' ||
      (filter === 'elementary' && ch.grades.includes('elementary')) ||
      (filter === 'middle' && ch.grades.includes('middle')) ||
      (filter === 'advanced' && ch.grades.includes('advanced'));
    const card = document.createElement('div');
    card.className = 'chapter-card' + (show ? '' : ' hidden');
    card.style.setProperty('--card-color', ch.color);
    card.style.setProperty('--card-dim', ch.dim);
    card.style.setProperty('--card-accent', ch.color.replace(')',',0.4)').replace('rgb','rgba'));

    // stripe
    const stripe = document.createElement('div');
    stripe.className = 'card-stripe';
    stripe.style.background = ch.color;
    card.appendChild(stripe);

    // body
    const body = document.createElement('div');
    body.className = 'card-body';

    // head
    const head = document.createElement('div');
    head.className = 'card-head';
    const icon = document.createElement('div');
    icon.className = 'card-icon';
    icon.style.background = ch.dim;
    icon.textContent = ch.icon;
    const meta = document.createElement('div');
    meta.className = 'card-meta';
    const chapLabel = document.createElement('div');
    chapLabel.className = 'card-chapter';
    chapLabel.textContent = ch.chapter;
    const titleEl = document.createElement('div');
    titleEl.className = 'card-title';
    titleEl.textContent = ch.title;
    meta.appendChild(chapLabel);
    meta.appendChild(titleEl);
    head.appendChild(icon);
    head.appendChild(meta);
    body.appendChild(head);

    // grade pills
    const pills = document.createElement('div');
    pills.className = 'grade-pills';
    ch.gradePills.forEach((p,i) => {
      const pill = document.createElement('span');
      pill.className = 'grade-pill ' + ['grade-el','grade-mid','grade-adv'][i] || 'grade-el';
      pill.textContent = p;
      pills.appendChild(pill);
    });
    body.appendChild(pills);

    // desc
    const desc = document.createElement('div');
    desc.className = 'card-desc';
    desc.textContent = ch.desc;
    body.appendChild(desc);

    // topic chips
    const chips = document.createElement('div');
    chips.className = 'topics-preview';
    ch.topics.slice(0,3).forEach(t => {
      const c2 = document.createElement('span');
      c2.className = 'topic-chip';
      c2.textContent = t.name;
      chips.appendChild(c2);
    });
    if(ch.topics.length > 3){
      const more = document.createElement('span');
      more.className = 'topic-chip';
      more.textContent = `+${ch.topics.length-3}개`;
      chips.appendChild(more);
    }
    body.appendChild(chips);

    // footer
    const footer = document.createElement('div');
    footer.className = 'card-footer';
    const diffBar = document.createElement('div');
    diffBar.className = 'difficulty-bar';
    for(let i=1;i<=5;i++){
      const dot = document.createElement('div');
      dot.className = 'diff-dot' + (i<=ch.difficulty?' on':'');
      if(i<=ch.difficulty) dot.style.background = ch.color;
      diffBar.appendChild(dot);
    }
    const arrow = document.createElement('div');
    arrow.className = 'card-arrow';
    arrow.textContent = '→';
    footer.appendChild(diffBar);
    footer.appendChild(arrow);
    body.appendChild(footer);

    card.appendChild(body);
    card.addEventListener('click', () => openModal(ch));
    grid.appendChild(card);
  });
}

/* ─────────────── MODAL ─────────────── */
function openModal(ch){
  const overlay = document.getElementById('modalOverlay');
  const header = document.getElementById('modalHeader');
  const body = document.getElementById('modalBody');

  // set accent
  document.getElementById('modal').style.setProperty('--modal-accent', ch.color);

  // header
  header.innerHTML = '';
  const micon = document.createElement('div');
  micon.className = 'modal-icon';
  micon.style.background = ch.dim;
  micon.textContent = ch.icon;
  const mtw = document.createElement('div');
  mtw.className = 'modal-title-wrap';
  const ml = document.createElement('div');
  ml.className = 'modal-chapter-label';
  ml.textContent = ch.chapter + ' · 사고력 수학';
  const mt = document.createElement('div');
  mt.className = 'modal-title';
  mt.style.color = ch.color;
  mt.textContent = ch.title;
  mtw.appendChild(ml);
  mtw.appendChild(mt);
  const closeBtn = document.createElement('button');
  closeBtn.className = 'modal-close';
  closeBtn.textContent = '×';
  closeBtn.onclick = closeModal;
  header.appendChild(micon);
  header.appendChild(mtw);
  header.appendChild(closeBtn);

  // body
  body.innerHTML = '';

  // Topics
  const s1 = makeModalSection('세부 단원');
  const topicList = document.createElement('div');
  topicList.className = 'topic-list';
  ch.topics.forEach((t,i) => {
    const item = document.createElement('div');
    item.className = 'topic-item';
    const num = document.createElement('div');
    num.className = 'topic-num';
    num.style.background = ch.color;
    num.textContent = String(i+1).padStart(2,'0');
    const tc = document.createElement('div');
    tc.className = 'topic-content';
    const tn = document.createElement('div');
    tn.className = 'topic-name';
    tn.textContent = t.name;
    const te = document.createElement('div');
    te.className = 'topic-eng';
    te.textContent = t.eng;
    const td = document.createElement('div');
    td.className = 'topic-detail';
    const ul = document.createElement('ul');
    t.detail.forEach(d => {
      const li = document.createElement('li');
      li.textContent = d;
      ul.appendChild(li);
    });
    td.appendChild(ul);
    const kws = document.createElement('div');
    kws.className = 'topic-keywords';
    t.keywords.forEach(k => {
      const kw = document.createElement('span');
      kw.className = 'kw';
      kw.textContent = k;
      kws.appendChild(kw);
    });
    td.appendChild(kws);
    tc.appendChild(tn);
    tc.appendChild(te);
    tc.appendChild(td);
    item.appendChild(num);
    item.appendChild(tc);
    item.addEventListener('click', () => {
      const isOpen = item.classList.contains('expanded');
      topicList.querySelectorAll('.topic-item').forEach(el => el.classList.remove('expanded'));
      topicList.querySelectorAll('.topic-detail').forEach(el => el.style.display='none');
      if(!isOpen){
        item.classList.add('expanded');
        td.style.display = 'block';
      }
    });
    topicList.appendChild(item);
  });
  s1.appendChild(topicList);
  body.appendChild(s1);

  // Sample Problems
  const s2 = makeModalSection('대표 예제 문제');
  ch.sampleProblems.forEach((p,i) => {
    const box = document.createElement('div');
    box.className = 'problem-box';
    box.style.borderLeftColor = ch.color;
    const lbl = document.createElement('div');
    lbl.className = 'problem-label';
    lbl.style.color = ch.color;
    lbl.textContent = `문제 ${i+1}`;
    const txt = document.createElement('div');
    txt.className = 'problem-text';
    txt.textContent = p;
    box.appendChild(lbl);
    box.appendChild(txt);
    s2.appendChild(box);
  });
  body.appendChild(s2);

  // Exam Tip
  const s3 = makeModalSection('시험 출제 포인트');
  const tipBox = document.createElement('div');
  tipBox.className = 'problem-box';
  tipBox.style.borderLeftColor = '#9b7fe8';
  const tipLbl = document.createElement('div');
  tipLbl.className = 'problem-label';
  tipLbl.style.color = '#9b7fe8';
  tipLbl.textContent = '💡 출제 TIPS';
  const tipTxt = document.createElement('div');
  tipTxt.className = 'problem-text';
  tipTxt.textContent = ch.examTip;
  tipBox.appendChild(tipLbl);
  tipBox.appendChild(tipTxt);
  s3.appendChild(tipBox);
  body.appendChild(s3);

  // Resources
  const s4 = makeModalSection('학습 정보');
  const rg = document.createElement('div');
  rg.className = 'resource-grid';
  [
    ['권장 학년·학습 시간', ch.time],
    ['추천 교재', ch.book],
    ['난이도', '★'.repeat(ch.difficulty) + '☆'.repeat(5-ch.difficulty)],
    ['관련 시험', '영재고 · 과학고 · KMO'],
  ].forEach(([k,v]) => {
    const ri = document.createElement('div');
    ri.className = 'resource-item';
    const rl = document.createElement('div');
    rl.className = 'res-label';
    rl.textContent = k;
    const rv = document.createElement('div');
    rv.className = 'res-value';
    rv.textContent = v;
    ri.appendChild(rl);
    ri.appendChild(rv);
    rg.appendChild(ri);
  });
  s4.appendChild(rg);
  body.appendChild(s4);

  overlay.classList.add('open');
}

function makeModalSection(title){
  const sec = document.createElement('div');
  sec.className = 'modal-section';
  const t = document.createElement('div');
  t.className = 'modal-section-title';
  t.textContent = title;
  sec.appendChild(t);
  return sec;
}

function closeModal(){
  document.getElementById('modalOverlay').classList.remove('open');
}
document.getElementById('modalOverlay').addEventListener('click', function(e){
  if(e.target === this) closeModal();
});

/* ─────────────── FILTER ─────────────── */
document.getElementById('filterGroup').addEventListener('click', function(e){
  const btn = e.target.closest('.filter-btn');
  if(!btn) return;
  this.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards(btn.dataset.filter);
});

/* ─────────────── ROADMAP ─────────────── */
function renderRoadmap(){
  const track = document.getElementById('roadmapTrack');
  ROADMAP.forEach(row => {
    const level = document.createElement('div');
    level.className = 'roadmap-level';
    const lbl = document.createElement('div');
    lbl.className = 'level-label';
    lbl.style.whiteSpace = 'pre-line';
    lbl.textContent = row.level;
    const chips = document.createElement('div');
    chips.className = 'roadmap-chips';
    row.items.forEach(item => {
      const chip = document.createElement('div');
      chip.className = 'roadmap-chip';
      chip.textContent = item;
      chip.addEventListener('mouseenter', () => chip.classList.add('hl'));
      chip.addEventListener('mouseleave', () => chip.classList.remove('hl'));
      chips.appendChild(chip);
    });
    level.appendChild(lbl);
    level.appendChild(chips);
    track.appendChild(level);
  });
}

/* ─────────────── INIT ─────────────── */
renderCards('all');
renderRoadmap();
